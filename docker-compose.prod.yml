services:
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    image: bharat-intelligence-backend:prod
    env_file:
      - ./Backend/.env
    ports:
      - "8000:8000"
    restart: unless-stopped

  celery_worker:
    image: bharat-intelligence-backend:prod
    command: celery -A config worker --loglevel=info
    env_file:
      - ./Backend/.env
    depends_on:
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    image: bharat-intelligence-frontend:prod
    env_file:
      - ./Frontend/.env.local
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped
